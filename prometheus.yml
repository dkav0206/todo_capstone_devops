scrape_configs:
  - job_name: 'prometheus'
    scrape_interval: 1m
    static_configs:
      - targets: ['3.107.52.207:9090']

  - job_name: 'node'
    static_configs:
      - targets: ['host-node-exporter:9100']

  - job_name: 'mongodb-atlas'
    scrape_interval: 30s
    static_configs:
      - targets: ['mongodb-exporter:9216']